<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#050e07"/>
  <!-- Phosphor scanline texture -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="url(#scan)" opacity="0.06"/>
  <defs>
    <pattern id="scan" width="32" height="2" patternUnits="userSpaceOnUse">
      <rect width="32" height="1" fill="#00ff66"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Mirror axis -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#00ff66" stroke-width="1" opacity="0.45" stroke-dasharray="2 2"/>
  <!-- Left chevron (YOU) -->
  <polyline points="5,16 11,10 11,22" fill="none" stroke="#00ff66" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Right chevron (LEADER) — mirrored -->
  <polyline points="27,16 21,10 21,22" fill="none" stroke="#00ff66" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Sync dot -->
  <circle cx="16" cy="16" r="2.2" fill="#00ff66" filter="url(#glow)"/>
</svg>
